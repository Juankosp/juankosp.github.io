<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>David Fairchild | Timeline</title>
  <meta name="description" content="Chronological timeline of David Fairchild's plant expeditions from CSV data.">

  <link rel="icon" href="../img/cecropiaicon.ico">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="site-nav">
    <span class="brand">David Fairchild</span>
    <ul>
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="timeline.html">Timeline</a></li>
      <li><a href="catalog.html">Catalog</a></li>
      <li><a href="notes.html">Notes</a></li>
      <li><a href="map.html">Map</a></li>
    </ul>
  </nav>

  <section class="section" style="padding-top: 6rem;">
    <h2>Timeline of David Fairchild's life and work</h2>
    <ul class="timeline" id="timeline-list">
      <li><p>Loading timeline...</p></li>
    </ul>
  </section>

  <footer class="site-footer">
    <p>David Fairchild project site &middot; <a href="index.html">Back to home</a> &middot; <a href="../index.html">Back to main site</a></p>
  </footer>

  <script>
    (function () {
      const TIMELINE_CSV = 'Fairchild_timeline.csv';
      const list = document.getElementById('timeline-list');

      function parseCSV(text) {
        const lines = text.split('\n');
        const headers = parseLine(lines[0] || '');
        const rows = [];

        for (let i = 1; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;
          const values = parseLine(line);
          const row = {};
          headers.forEach(function (h, idx) {
            row[h.trim()] = (values[idx] || '').trim();
          });
          rows.push(row);
        }
        return rows;
      }

      function parseLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (inQuotes) {
            if (ch === '"' && line[i + 1] === '"') {
              current += '"';
              i++;
            } else if (ch === '"') {
              inQuotes = false;
            } else {
              current += ch;
            }
          } else if (ch === '"') {
            inQuotes = true;
          } else if (ch === ',') {
            result.push(current);
            current = '';
          } else {
            current += ch;
          }
        }
        result.push(current);
        return result;
      }

      function renderEntry(row) {
        const li = document.createElement('li');

        const yearSpan = document.createElement('span');
        yearSpan.className = 'year';
        yearSpan.textContent = row.Year || '';
        li.appendChild(yearSpan);

        if (row.Country) {
          const countrySpan = document.createElement('span');
          countrySpan.className = 'country';
          countrySpan.textContent = row.Country;
          li.appendChild(countrySpan);
        }

        const p = document.createElement('p');
        p.textContent = row.Event || '';
        li.appendChild(p);

        if (row.Crop && row.Crop !== 'NA') {
          const tagsDiv = document.createElement('div');
          tagsDiv.className = 'crop-tags';
          row.Crop.split(';').forEach(function (crop) {
            const trimmed = crop.trim();
            if (!trimmed) return;
            const tag = document.createElement('span');
            tag.className = 'crop-tag';
            tag.textContent = trimmed;
            tagsDiv.appendChild(tag);
          });
          li.appendChild(tagsDiv);
        }

        if (row.Source) {
          const sourceSmall = document.createElement('small');
          sourceSmall.className = 'source';
          sourceSmall.textContent = row.Source;
          li.appendChild(sourceSmall);
        }

        return li;
      }

      fetch(TIMELINE_CSV)
        .then(function (res) {
          if (!res.ok) throw new Error('Could not load ' + TIMELINE_CSV);
          return res.text();
        })
        .then(function (text) {
          const rows = parseCSV(text);
          list.innerHTML = '';
          rows.forEach(function (row) {
            list.appendChild(renderEntry(row));
          });
        })
        .catch(function (err) {
          list.innerHTML = '<li><p style="color:red;">Error loading timeline: ' +
            err.message + '. Make sure Fairchild_timeline.csv is in the same folder.</p></li>';
        });
    })();
  </script>
</body>
</html>
